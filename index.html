<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro 2026 - Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --excel-primary: #107c41;
            --excel-bg: #f3f2f1;
            --text-main: #323130;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--excel-bg);
            color: var(--text-main);
            overflow: hidden;
            margin: 0;
        }

        /* Animations */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: pop 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Responsive Table Container */
        .excel-table-container {
            height: calc(100vh - 190px); 
            overflow: auto;
            border: 1px solid #d2d0ce;
            background: white;
            border-radius: 8px;
            position: relative;
        }

        .excel-table {
            border-collapse: separate;
            border-spacing: 0;
            font-size: 11px;
        }

        .excel-table th, .excel-table td {
            border-right: 1px solid #edebe9;
            border-bottom: 1px solid #edebe9;
            min-width: 40px;
            height: 34px; 
            padding: 0;
            text-align: center;
        }

        /* Sticky Logic */
        .sticky-no {
            position: sticky; left: 0; z-index: 25;
            background: #f3f2f1 !important;
            min-width: 35px !important;
            border-right: 1px solid #d2d0ce !important;
            font-weight: 800;
        }

        .sticky-col {
            position: sticky; left: 35px; z-index: 20;
            background: #faf9f8 !important;
            border-right: 2px solid var(--excel-primary) !important;
            min-width: 180px !important;
            text-align: left !important;
            padding: 0 10px !important;
            font-weight: 700;
        }

        /* Right Stat Column (Percentage) */
        .sticky-stat-right {
            position: sticky; right: 0; z-index: 20;
            background: #f8fff9 !important;
            border-left: 2px solid var(--excel-primary) !important;
            min-width: 60px !important;
            font-weight: 800;
            color: var(--excel-primary);
        }

        .sticky-header {
            position: sticky; top: 0; z-index: 35;
            background: #f3f2f1 !important;
            font-weight: 800;
            border-bottom: 2px solid var(--excel-primary) !important;
        }

        th.sticky-no.sticky-header { z-index: 45; }
        th.sticky-col.sticky-header { z-index: 40; }
        th.sticky-stat-right.sticky-header { z-index: 40; }

        /* Cell Interaction */
        .cell-status {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px;
            transition: background 0.1s;
        }
        .status-check { color: #107c41; background: #ebf9f1; }
        .status-cross { color: #d83b01; background: #fff1f0; }

        /* Footer Eval Styling */
        .eval-row td {
            background: #f8fff9;
            font-weight: 800;
            font-size: 10px;
            color: var(--excel-primary);
            border-top: 1px solid var(--excel-primary);
        }

        /* Modal UI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; padding: 24px; border-radius: 12px;
            width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        /* Controls */
        .email-input {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            width: 200px;
            outline: none;
        }
        .email-input:focus { background: white; color: var(--excel-primary); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Mobile adjustment */
        @media (max-width: 768px) {
            .sticky-col { min-width: 140px !important; }
            .excel-table-container { height: calc(100vh - 240px); }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="bg-[#107c41] text-white px-4 py-3 flex flex-wrap items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 3h18v18H3zM3 9h18M9 21V9"/></svg>
            <h1 class="font-extrabold text-lg uppercase tracking-tight leading-none">TaskMaster 2026</h1>
        </div>

        <div class="flex items-center gap-3 mt-2 sm:mt-0">
            <div class="relative">
                <input type="email" id="user-email" class="email-input" placeholder="Email Anda..." onchange="handleEmailChange()">
                <div id="save-indicator" class="absolute -bottom-4 left-0 text-[8px] font-bold text-white opacity-0 transition-opacity uppercase">Tersimpan</div>
            </div>
            
            <div class="flex gap-2 bg-black/20 p-1 rounded-lg">
                <button onclick="exportMenu()" class="p-1.5 hover:bg-white/20 rounded-md" title="Download Data">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                </button>
                <label class="p-1.5 hover:bg-white/20 rounded-md cursor-pointer" title="Unggah Data">
                    <input type="file" id="importInput" class="hidden" accept=".json,.csv,.xlsx" onchange="importData(event)">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                </label>
            </div>
        </div>
    </header>

    <!-- Months & Mode -->
    <nav class="bg-white border-b border-[#d2d0ce] px-4 py-1.5 flex items-center justify-between shadow-sm overflow-x-auto no-scrollbar">
        <div class="flex gap-1">
            <script>
                const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
                months.forEach((m, i) => {
                    document.write(`<button onclick="switchMonth(${i})" id="btn-month-${i}" class="px-2.5 py-1.5 text-[10px] font-bold rounded-md hover:bg-gray-100 uppercase transition-all whitespace-nowrap">${m}</button>`);
                });
            </script>
        </div>
        <div class="flex gap-1 ml-4">
            <button onclick="toggleEditMode()" id="btn-edit-mode" class="px-3 py-1.5 bg-gray-100 text-[10px] font-bold rounded-md uppercase border border-gray-300">
                <span id="label-edit">Kelola Daftar</span>
            </button>
            <button onclick="showAddModal()" class="px-3 py-1.5 bg-[#107c41] text-white text-[10px] font-bold rounded-md uppercase">+ Tambah</button>
        </div>
    </nav>

    <main class="p-2 lg:p-4">
        <!-- Stats Bar -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <div class="bg-white p-3 rounded-xl border-l-4 border-[#107c41] shadow-sm">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-1">Skor Bulanan</p>
                <h2 id="total-percent" class="text-2xl font-black text-[#107c41]">0%</h2>
            </div>
            <div class="bg-white p-3 rounded-xl border-l-4 border-blue-600 shadow-sm">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-1">Grade Kualitatif</p>
                <h2 id="qualitative-grade" class="text-2xl font-black text-blue-700">-</h2>
            </div>
            <div class="bg-white p-3 rounded-xl border-l-4 border-orange-500 shadow-sm">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-1">Total Checklist</p>
                <h2 id="stat-done" class="text-2xl font-black text-orange-600">0</h2>
            </div>
            <div class="bg-white p-3 rounded-xl border-l-4 border-red-500 shadow-sm overflow-hidden">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-1">Data Akun</p>
                <h2 id="data-identity-label" class="text-sm font-black text-red-600 truncate uppercase mt-1">Guest</h2>
            </div>
        </div>

        <!-- Table -->
        <div class="excel-table-container shadow-2xl" id="tableContainer">
            <table class="excel-table w-full">
                <thead><tr id="header-row"></tr></thead>
                <tbody id="table-body"></tbody>
                <tfoot id="table-footer"></tfoot>
            </table>
        </div>
    </main>

    <!-- Modal Add -->
    <div id="modalAdd" class="modal-overlay">
        <div class="modal-content">
            <h3 class="font-extrabold text-gray-800 uppercase text-base mb-2">Aktivitas Baru</h3>
            <p class="text-[10px] text-gray-400 font-bold mb-4 uppercase">Tambahkan ke dalam daftar pantauan</p>
            <input type="text" id="newActivityName" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-4 outline-none focus:border-[#107c41] font-bold" placeholder="Ketik nama aktivitas...">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal('modalAdd')" class="px-5 py-2.5 text-xs font-bold text-gray-400 uppercase">Batal</button>
                <button onclick="confirmAdd()" class="px-5 py-2.5 text-xs font-bold bg-[#107c41] text-white rounded-xl uppercase shadow-lg shadow-emerald-200">Simpan Aktivitas</button>
            </div>
        </div>
    </div>

    <!-- Export Menu Modal -->
    <div id="modalExport" class="modal-overlay">
        <div class="modal-content">
            <h3 class="font-extrabold text-gray-800 uppercase text-base mb-4">Ekspor Data</h3>
            <div class="grid grid-cols-1 gap-2">
                <button onclick="performExport('xlsx')" class="flex items-center justify-between w-full p-4 bg-emerald-50 border-2 border-emerald-100 rounded-xl hover:bg-emerald-100 transition-all">
                    <span class="font-bold text-emerald-800">Microsoft Excel (.xlsx)</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </button>
                <button onclick="performExport('csv')" class="flex items-center justify-between w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-xl hover:bg-blue-100 transition-all">
                    <span class="font-bold text-blue-800">Standard CSV (.csv)</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                </button>
                <button onclick="performExport('json')" class="flex items-center justify-between w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl hover:bg-gray-100 transition-all">
                    <span class="font-bold text-gray-800">Backup JSON (.json)</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg>
                </button>
            </div>
            <button onclick="closeModal('modalExport')" class="w-full mt-4 p-3 text-xs font-bold text-gray-400 uppercase">Tutup</button>
        </div>
    </div>

    <script>
        const DEFAULT_ACTS = [
            "Sholat Tahajud", "Tilawah Alquran", "Hafalan Alquran", "Sholat Berjamaah", 
            "Sholat Dhuha", "Olahraga Pagi", "Buat Konten Dakwah", "Update Medsos", 
            "Baca Buku 50 Hal", "Upgrade Tsaqafah", "Bahasa Arab", "Materi Mengajar"
        ];

        let currentEmail = localStorage.getItem('tm_user_email') || 'Guest';
        let currentMonth = new Date().getMonth();
        let db = {};
        let editMode = false;

        function init() {
            document.getElementById('user-email').value = currentEmail === 'Guest' ? '' : currentEmail;
            loadData();
            switchMonth(currentMonth);
        }

        function loadData() {
            currentEmail = document.getElementById('user-email').value.trim() || 'Guest';
            localStorage.setItem('tm_user_email', currentEmail);
            document.getElementById('data-identity-label').innerText = currentEmail;
            
            const saved = localStorage.getItem(`tm_data_v2_${currentEmail}`);
            if (saved) {
                db = JSON.parse(saved);
            } else {
                db = {};
                for(let i=0; i<12; i++) {
                    db[i] = {};
                    DEFAULT_ACTS.forEach(a => db[i][a] = {});
                }
            }
            render();
        }

        function handleEmailChange() { loadData(); }

        function toggleEditMode() {
            editMode = !editMode;
            document.getElementById('label-edit').innerText = editMode ? "Selesai" : "Kelola Daftar";
            document.getElementById('btn-edit-mode').classList.toggle('bg-red-600', editMode);
            document.getElementById('btn-edit-mode').classList.toggle('text-white', editMode);
            render();
        }

        function switchMonth(idx) {
            currentMonth = idx;
            months.forEach((_, i) => {
                const btn = document.getElementById(`btn-month-${i}`);
                btn.className = (i === idx) 
                    ? "px-2.5 py-1.5 text-[10px] font-bold rounded-md bg-[#107c41] text-white uppercase shadow-md" 
                    : "px-2.5 py-1.5 text-[10px] font-bold rounded-md hover:bg-gray-100 uppercase transition-all";
            });
            render();
        }

        function render() {
            const h = document.getElementById('header-row');
            const b = document.getElementById('table-body');
            const f = document.getElementById('table-footer');
            if (!h || !b || !f) return;
            
            // Header: # | Aktifitas | 1-31 | %
            let hHtml = `<th class="sticky-header sticky-no">#</th><th class="sticky-header sticky-col">DAFTAR AKTIVITAS</th>`;
            for (let d = 1; d <= 31; d++) hHtml += `<th class="sticky-header">${d}</th>`;
            hHtml += `<th class="sticky-header sticky-stat-right">%</th>`;
            h.innerHTML = hHtml;

            const monthData = db[currentMonth] || {};
            const activities = Object.keys(monthData);
            let bHtml = '';
            let totalChecks = 0;
            let dailyCounts = Array(32).fill(0);

            activities.forEach((act, idx) => {
                let rowChecks = 0;
                let cellsHtml = '';

                for (let d = 1; d <= 31; d++) {
                    const status = monthData[act][d] || 'none';
                    let sym = '', cls = '';
                    if (status === 'check') { sym = '✅'; cls = 'status-check animate-pop'; rowChecks++; dailyCounts[d]++; totalChecks++; }
                    if (status === 'cross') { sym = '❌'; cls = 'status-cross animate-pop'; }
                    cellsHtml += `<td><div class="cell-status ${cls}" onclick="handleCellClick('${act}', ${d})">${sym}</div></td>`;
                }

                const rowPercent = Math.round((rowChecks / 31) * 100);

                bHtml += `<tr>
                    <td class="sticky-no">${idx + 1}</td>
                    <td class="sticky-col group">
                        <div class="flex items-center justify-between overflow-hidden">
                            <span contenteditable="true" onblur="renameAct('${act}', this.innerText)" class="outline-none truncate font-bold">${act}</span>
                            ${editMode ? `<button onclick="deleteAct('${act}')" class="text-red-600 font-black px-2 hover:bg-red-50 rounded">×</button>` : ''}
                        </div>
                    </td>
                    ${cellsHtml}
                    <td class="sticky-stat-right">${rowPercent}%</td>
                </tr>`;
            });
            b.innerHTML = bHtml;

            // Footer: Σ | Persen Harian
            let fHtml = `<tr class="eval-row"><td class="sticky-no">Σ</td><td class="sticky-col">CAPAIAN HARIAN (%)</td>`;
            let monthlyScoreSum = 0;
            for (let d = 1; d <= 31; d++) {
                const p = activities.length > 0 ? Math.round((dailyCounts[d] / activities.length) * 100) : 0;
                monthlyScoreSum += p;
                fHtml += `<td>${p}%</td>`;
            }
            fHtml += `<td class="sticky-stat-right">-</td></tr>`;
            f.innerHTML = fHtml;

            // Stats update
            const finalAvg = Math.round(monthlyScoreSum / 31);
            document.getElementById('total-percent').innerText = finalAvg + "%";
            document.getElementById('qualitative-grade').innerText = (finalAvg >= 90 ? "A (MUMTAZ)" : finalAvg >= 75 ? "B (JAYYID)" : finalAvg >= 50 ? "C (MAQBUL)" : "D (DHAIF)");
            document.getElementById('stat-done').innerText = totalChecks;
        }

        function handleCellClick(act, day) {
            if (editMode) return;
            const states = ['none', 'check', 'cross'];
            const current = db[currentMonth][act][day] || 'none';
            db[currentMonth][act][day] = states[(states.indexOf(current) + 1) % 3];
            save(); render();
        }

        function renameAct(old, nw) {
            const clean = nw.trim();
            if (!clean || old === clean) return;
            db[currentMonth][clean] = db[currentMonth][old];
            delete db[currentMonth][old];
            save(); render();
        }

        function showAddModal() { document.getElementById('modalAdd').style.display = 'flex'; document.getElementById('newActivityName').focus(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function confirmAdd() {
            const name = document.getElementById('newActivityName').value.trim();
            if (name) {
                if (!db[currentMonth][name]) db[currentMonth][name] = {};
                document.getElementById('newActivityName').value = '';
                save(); render(); closeModal('modalAdd');
            }
        }

        function deleteAct(act) {
            if(confirm(`Hapus "${act}"?`)) { delete db[currentMonth][act]; save(); render(); }
        }

        function save() {
            localStorage.setItem(`tm_data_v2_${currentEmail}`, JSON.stringify(db));
            const ind = document.getElementById('save-indicator');
            ind.style.opacity = '1';
            setTimeout(() => ind.style.opacity = '0', 1000);
        }

        // --- EXPORT / IMPORT LOGIC ---
        function exportMenu() { document.getElementById('modalExport').style.display = 'flex'; }

        function performExport(type) {
            const monthName = months[currentMonth];
            const data = db[currentMonth];
            const rows = [];
            
            // Header row
            const header = ["No", "Aktivitas"];
            for(let i=1; i<=31; i++) header.push(i.toString());
            header.push("Persentase (%)");
            rows.push(header);

            Object.keys(data).forEach((act, idx) => {
                const row = [idx + 1, act];
                let checks = 0;
                for(let i=1; i<=31; i++) {
                    const s = data[act][i] || '';
                    row.push(s === 'check' ? 'V' : s === 'cross' ? 'X' : '');
                    if(s === 'check') checks++;
                }
                row.push(Math.round((checks/31)*100).toString() + "%");
                rows.push(row);
            });

            if(type === 'json') {
                const blob = new Blob([JSON.stringify(db)], { type: "application/json" });
                downloadBlob(blob, `Full_Backup_TaskMaster_2026.json`);
            } else if(type === 'csv') {
                const csvContent = rows.map(r => r.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: "text/csv" });
                downloadBlob(blob, `Checklist_${monthName}_2026.csv`);
            } else if(type === 'xlsx') {
                const ws = XLSX.utils.aoa_to_sheet(rows);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, monthName);
                XLSX.writeFile(wb, `Audit_Kinerja_${monthName}_2026.xlsx`);
            }
            closeModal('modalExport');
        }

        function downloadBlob(blob, name) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            
            if(file.name.endsWith('.json')) {
                reader.onload = (ev) => { db = JSON.parse(ev.target.result); save(); render(); alert("Import JSON Berhasil!"); };
                reader.readAsText(file);
            } else if(file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                reader.onload = (ev) => {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
                    
                    // Basic parsing logic to fill current month
                    if(confirm("Impor data Excel ke bulan ini? Data lama di bulan ini akan tertimpa.")) {
                        db[currentMonth] = {};
                        jsonData.slice(1).forEach(row => {
                            if(row[1]) {
                                const actName = row[1];
                                db[currentMonth][actName] = {};
                                for(let d=1; d<=31; d++) {
                                    const val = row[d+1];
                                    if(val === 'V' || val === 'v') db[currentMonth][actName][d] = 'check';
                                    if(val === 'X' || val === 'x') db[currentMonth][actName][d] = 'cross';
                                }
                            }
                        });
                        save(); render(); alert("Excel Terimpor ke bulan " + months[currentMonth]);
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        }

        window.onclick = (e) => { if (e.target.className === 'modal-overlay') e.target.style.display = 'none'; }
        window.onload = init;
    </script>
</body>
</html>
